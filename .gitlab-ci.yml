# Weekly Mon-Fri 6:59 AM UTC (equiv to 11:59 AM UTC? Adjust cron)
waka-update:
  image: node:20
  stage: update
  script:
    - npm init -y && npm i axios cheerio  # For parsing if needed
    - |
      cat << 'EOF' > waka-stats.js
      const axios = require('axios');
      const fs = require('fs');
      
      const API_KEY = process.env.WAKATIME_API_KEY;
      async function update() {
        // Fetch summaries (customize range=last_7_days,30_days)
        const res = await axios.get('https://wakatime.com/api/v1/users/current/summaries?range=last_7_days', {
          headers: { Authorization: `Basic ${Buffer.from(API_KEY + ':').toString('base64')}` }
        });
        const data = res.data.data[0];
        const total = data.grand_total.human_total_seconds || '0h';
        const langs = data.languages.slice(0,5).map(l => `${l.name} ${l.percent.toFixed(1)}%`).join(' | ');
        const projects = data.projects.slice(0,3).map(p => p.name).join(', ');
        // Embed SVG/chart logic here (use canvas for LOC chart if SHOW_LOC_CHART=True)
        const section = `<!--START_SECTION:waka-->\n**Weekly:** ${total} | **Langs:** ${langs} | **Projects:** ${projects}\n<!--END_SECTION:waka-->`;
        let readme = fs.readFileSync('README.md', 'utf8');
        readme = readme.replace(/<!--START_SECTION:waka-->[\s\S]*<!--END_SECTION:waka-->/, section);
        fs.writeFileSync('README.md', readme);
      }
      update();
      EOF
    - node waka-stats.js
    - git config user.name "GitLab CI" && git config user.email "ci@gitlab.com"
    - git add README.md && git commit -m "Update WakaTime [skip ci]" || exit 0
    - git push "https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" ${CI_DEFAULT_BRANCH}
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  variables:
    WAKATIME_API_KEY: $WAKATIME_API_KEY  # Set in CI/CD Variables (masked)
